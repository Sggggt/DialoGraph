services:
  api:
    image: ${API_IMAGE:-course-kg-api:local}
    pull_policy: never
    container_name: course-kg-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/course_kg
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DATA_ROOT: /app/data
      STORAGE_ROOT: /app/data/storage
      INGESTION_ROOT: /app/data/ingestion
      OPENAI_BASE_URL: ${API_OPENAI_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
      OPENAI_RESOLVE_IP: ${API_OPENAI_RESOLVE_IP:-${OPENAI_RESOLVE_IP:-}}
      ENABLE_MODEL_FALLBACK: "false"
      ENABLE_DATABASE_FALLBACK: "false"
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data
      - ../.env:/app/.env
      - ../.env.example:/app/.env.example:ro
      - ../data/models/huggingface:/app/models/huggingface
      - ../apps/api/app:/app/apps/api/app
      - ../apps/api/tests:/app/apps/api/tests
      - ../scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  web:
    image: ${WEB_IMAGE:-course-kg-web:local}
    pull_policy: never
    container_name: course-kg-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${API_HOST_PORT:-8000}/api
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"

  postgres:
    image: postgres:16
    container_name: course-kg-postgres
    environment:
      POSTGRES_DB: course_kg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d course_kg"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: course-kg-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: course-kg-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  experiment:
    profiles: ["experiment"]
    image: ${EXPERIMENT_IMAGE:-course-kg-experiment:local}
    build:
      context: ..
      dockerfile: comparative_experiment/Dockerfile
    env_file:
      - ../.env
    environment:
      PROJECT_ROOT: /workspace
      DATA_ROOT: /workspace/data
      REPORT_OUTPUT_DIR: /workspace/comparative_experiment/data/reports
      RAW_RESULTS_DIR: /workspace/comparative_experiment/data/raw_results
      PREPARED_CORPUS_DIR: /workspace/comparative_experiment/data/prepared_corpus
      API_BASE_URL: http://api:8000/api
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/course_kg
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      ENABLE_MODEL_FALLBACK: "false"
      ENABLE_DATABASE_FALLBACK: "false"
      EXPERIMENT_MODE: small
      EXPERIMENT_SYSTEMS: S1,S2,S3,S4
      JUDGE_MODEL: qwen3.6-plus
      JUDGE_REPETITIONS: "1"
    volumes:
      - ../:/workspace
      - ../.env:/workspace/.env:ro
      - ../.env.example:/workspace/.env.example:ro
      - ../data:/workspace/data
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

volumes:
  qdrant-data:
