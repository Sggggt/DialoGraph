services:
  postgres:
    image: postgres:16
    container_name: course-kg-postgres
    environment:
      POSTGRES_DB: knowledge_base
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: course-kg-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: course-kg-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage
