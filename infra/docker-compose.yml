services:
  api:
    image: ${API_IMAGE:-course-kg-api:local}
    pull_policy: never
    container_name: course-kg-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/course_kg
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DATA_ROOT: /app/data
      STORAGE_ROOT: /app/data/storage
      INGESTION_ROOT: /app/data/ingestion
      OPENAI_BASE_URL: ${API_OPENAI_BASE_URL-${OPENAI_BASE_URL}}
      OPENAI_RESOLVE_IP: ${API_OPENAI_RESOLVE_IP-${OPENAI_RESOLVE_IP}}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      RERANKER_URL: http://reranker:8080/rerank
      ENABLE_MODEL_FALLBACK: "false"
      ENABLE_DATABASE_FALLBACK: "false"
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data
      - ../.env:/app/.env
    depends_on:
      - postgres
      - redis
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  web:
    image: ${WEB_IMAGE:-course-kg-web:local}
    pull_policy: never
    container_name: course-kg-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${API_HOST_PORT:-8000}/api
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"

  postgres:
    image: postgres:16
    container_name: course-kg-postgres
    environment:
      POSTGRES_DB: course_kg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: course-kg-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: course-kg-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage
