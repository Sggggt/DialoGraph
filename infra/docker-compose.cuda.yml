services:
  reranker-cuda:
    image: ${RERANKER_CUDA_IMAGE:-text-reranker-runtime:cuda}
    pull_policy: never
    container_name: text-reranker-runtime
    profiles:
      - reranker-cuda
    environment:
      HF_HOME: /models/huggingface
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANKER_DEVICE: cuda
      RERANKER_MAX_LENGTH: ${RERANKER_MAX_LENGTH:-512}
    volumes:
      - ../models:/models
    networks:
      default:
        aliases:
          - reranker
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20
